# Nyro standalone config for L2 aimock static E2E tests.
#
# Four isolated aimock instances provide deterministic byte-level responses:
#
#   Port 4010  →  fixtures/openai-completions/   OpenAI Chat (/v1/chat/completions)
#   Port 4011  →  fixtures/openai-responses/     OpenAI Responses (/v1/responses)
#   Port 4012  →  fixtures/anthropic-messages/   Anthropic (/v1/messages)
#   Port 4013  →  fixtures/google-generatecontent/ Gemini
#
# Pytest fixtures substitute proxy_port and the AIMOCK_* port placeholders before start.

server:
  proxy_host: "127.0.0.1"
  proxy_port: 19531

providers:
  - name: mock-openai-chat
    default_protocol: openai
    endpoints:
      openai:
        base_url: "http://127.0.0.1:{AIMOCK_OPENAI_COMPLETIONS_PORT}/v1"
    api_key: "mock"

  - name: mock-openai-responses
    default_protocol: openai_responses
    endpoints:
      openai_responses:
        base_url: "http://127.0.0.1:{AIMOCK_OPENAI_RESPONSES_PORT}/v1"
    api_key: "mock"

  - name: mock-anthropic
    default_protocol: anthropic
    endpoints:
      anthropic:
        base_url: "http://127.0.0.1:{AIMOCK_ANTHROPIC_PORT}"
    api_key: "mock"

  - name: mock-gemini
    default_protocol: gemini
    endpoints:
      gemini:
        base_url: "http://127.0.0.1:{AIMOCK_GEMINI_PORT}"
    api_key: "mock"

routes:
  - name: mock-chat
    vmodel: mock-chat
    targets:
      - provider: mock-openai-chat
        model: "gpt-4o"

  - name: mock-responses
    vmodel: mock-responses
    targets:
      - provider: mock-openai-responses
        model: "gpt-4o"

  - name: mock-anthropic
    vmodel: mock-anthropic
    targets:
      - provider: mock-anthropic
        model: "claude-3-5-sonnet"

  - name: mock-gemini
    vmodel: mock-gemini
    targets:
      - provider: mock-gemini
        model: "gemini-2.0-flash"
