[pytest]
testpaths = tests/e2e
python_files = test_*.py
addopts = -ra
markers =
    e2e: End-to-end tests.
    proxy: Proxy / protocol-conversion matrix tests (backed by nyro-tools replay).
    admin: Admin/control-plane tests.
    storage: Storage backend equivalence tests.
    slow: Slow-running tests.
    flaky: Tests that may need retries in CI.
