[pytest]
testpaths = tests/e2e
python_files = test_*.py
addopts = -ra
markers =
    e2e: End-to-end tests.
    aimock: Static aimock-backed protocol regression tests.
    ollama: Dynamic Ollama-backed inference tests.
    admin: Admin/control-plane tests.
    storage: Storage backend equivalence tests.
    slow: Slow-running tests.
    flaky: Tests that may need retries in CI.
